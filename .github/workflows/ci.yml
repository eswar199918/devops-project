name: DevOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------
    # BUILD DOCKER IMAGE
    # ---------------------------
    - name: Build Docker Image
      run: docker build -t eswar1806/myapp:${{ github.sha }} .

    # ---------------------------
    # TRIVY SCAN
    # ---------------------------
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'eswar1806/myapp:${{ github.sha }}'
        format: 'table'
        exit-code: '0'          # Set to 0 so it just warns you, but doesn't fail the build
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # ---------------------------
    # BUILD DOCKER IMAGE
    # ---------------------------
    - name: Build Docker Image
      run: |
        docker build -t eswar1806/myapp:${{ github.sha }} -t eswar1806/myapp:latest .

    # (Skip Trivy section, keep it the same)

    # ---------------------------
    # PUSH TO DOCKER HUB
    # ---------------------------
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: eswar1806
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Image
      run: |
        docker push eswar1806/myapp:${{ github.sha }}
        docker push eswar1806/myapp:latest
