name: DevOps CI Pipeline

on:
  push:
    branches: [ "main" ]

# Grant permission to push commits
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------
    # BUILD DOCKER IMAGE
    # ---------------------------
    - name: Build Docker Image
      run: docker build -t eswar1806/myapp:${{ github.sha }} .

    # ---------------------------
    # PUSH TO DOCKER HUB
    # ---------------------------
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: eswar1806
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Image
      run: docker push eswar1806/myapp:${{ github.sha }}

    # ---------------------------
    # THE ENTERPRISE GITOPS MAGIC
    # ---------------------------
    - name: Update Helm Values
      run: |
        # Use a Linux text editor (sed) to find the tag line and replace it with the new SHA
        sed -i 's/tag: .*/tag: "${{ github.sha }}"/' myapp-chart/values.yaml

    - name: Commit and Push to GitHub
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "GitHub Actions Bot"
        git add myapp-chart/values.yaml
        git commit -m "Update image tag to ${{ github.sha }}"
        git push
